<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MELANIE'S ARCHIVE | Admin Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="style.css" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#c7c6c6",
                    "outline": "#747878",
                    "inverse-primary": "#c8c6c5",
                    "on-primary-fixed": "#1c1b1b",
                    "secondary": "#5e5e5e",
                    "surface-container-high": "#e8e8e8",
                    "inverse-surface": "#2f3131",
                    "on-surface-variant": "#444748",
                    "on-secondary-fixed-variant": "#464747",
                    "on-primary-fixed-variant": "#474746",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#c8c6c5",
                    "surface-variant": "#e2e2e2",
                    "on-tertiary-fixed-variant": "#454747",
                    "surface-dim": "#dadada",
                    "surface-container": "#eeeeee",
                    "primary-fixed": "#e5e2e1",
                    "on-surface": "#1a1c1c",
                    "tertiary-fixed": "#e2e2e2",
                    "secondary-container": "#e3e2e2",
                    "inverse-on-surface": "#f1f1f1",
                    "on-background": "#1a1c1c",
                    "tertiary-fixed-dim": "#c6c6c6",
                    "on-secondary-container": "#646464",
                    "on-secondary-fixed": "#1b1c1c",
                    "tertiary-container": "#1a1c1c",
                    "outline-variant": "#c4c7c7",
                    "on-primary-container": "#858383",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed": "#1a1c1c",
                    "surface-bright": "#f9f9f9",
                    "primary-container": "#1c1b1b",
                    "on-tertiary-container": "#838484",
                    "secondary-fixed": "#e3e2e2",
                    "background": "#f9f9f9",
                    "surface-tint": "#5f5e5e",
                    "surface-container-highest": "#e2e2e2",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f3f3f3",
                    "surface": "#f9f9f9",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "tertiary": "#000000",
                    "primary": "#000000"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "margin-mobile": "24px",
                    "gutter": "32px",
                    "container-max": "1200px",
                    "section-padding": "120px"
            },
            "fontFamily": {
                    "label-sm": ["DM Sans"],
                    "headline-lg-mobile": ["Libre Caslon Text"],
                    "headline-lg": ["Libre Caslon Text"],
                    "display-lg": ["Libre Caslon Text"],
                    "body-lg": ["DM Sans"],
                    "headline-md": ["Libre Caslon Text"],
                    "body-md": ["DM Sans"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "500"}],
                    "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "400"}],
                    "headline-lg": ["40px", {"lineHeight": "1.2", "fontWeight": "400"}],
                    "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],

        },
      }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="font-body-md text-body-md bg-surface page-fade-in">
    <main class="min-h-screen flex flex-col items-center justify-center px-margin-mobile md:px-gutter">
        <div id="parallax-container" class="w-full max-w-[400px] flex flex-col space-y-12 transition-transform duration-200">
            <!-- Branding/Heading Area -->
            <header class="text-center md:text-left">
                <div class="mb-12 inline-block">
                    <span class="font-headline-md text-headline-md uppercase tracking-widest text-primary leading-tight font-bold">MELANIE'S ARCHIVE</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">Access the Archive</h1>
            </header>

            <!-- Login Form -->
            <form id="loginForm" class="flex flex-col space-y-10">
                <div class="space-y-6">
                    <!-- Email Field -->
                    <div class="flex flex-col">
                        <label class="font-label-sm text-label-sm text-on-surface-variant mb-2" for="email">EMAIL ADDRESS</label>
                        <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant" id="email" name="email" placeholder="Enter your email" required="" type="email" value="admin@archive.com"/>
                    </div>
                    <!-- Password Field -->
                    <div class="flex flex-col">
                        <div class="flex justify-between items-end mb-2">
                            <label class="font-label-sm text-label-sm text-on-surface-variant" for="password">PASSWORD</label>
                            <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors underline underline-offset-4 decoration-outline-variant" href="#" onclick="alert('Password is: admin')">FORGOT?</a>
                        </div>
                        <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password" value="admin"/>
                    </div>
                </div>

                <!-- Error Message Container -->
                <div id="login-error" class="hidden text-error font-label-sm text-sm">
                    Invalid credentials. Please use admin@archive.com / admin.
                </div>

                <!-- Action Button -->
                <button class="bg-primary text-on-primary py-4 px-8 font-label-sm text-label-sm tracking-widest uppercase transition-opacity duration-300 hover:opacity-80 active:scale-[0.98] w-full" type="submit">
                    Sign In
                </button>
            </form>

            <!-- Back to Journal / Public Link -->
            <footer class="pt-8 text-center md:text-left">
                <a class="group inline-flex items-center gap-2 font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="index.html">
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                    <span>RETURN TO INDEX</span>
                </a>
            </footer>
        </div>
    </main>

    <!-- Global Footer -->
    <footer class="w-full py-section-padding px-margin-mobile md:px-gutter flex flex-col md:flex-row justify-between items-start md:items-center gap-unit max-w-container-max mx-auto border-t border-outline-variant">
        <div class="flex flex-col gap-2">
            <span class="font-headline-md text-headline-md text-primary leading-tight font-bold">MELANIE'S ARCHIVE</span>
            <p class="font-label-sm text-label-sm text-on-surface-variant">© 2026 MELANIE'S ARCHIVE. ALL RIGHTS RESERVED.</p>
        </div>
        <nav class="flex gap-gutter mt-8 md:mt-0">
            <a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary underline decoration-1 underline-offset-4 transition-all duration-300" href="#">Instagram</a>
            <a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary underline decoration-1 underline-offset-4 transition-all duration-300" href="#">LinkedIn</a>
            <a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary underline decoration-1 underline-offset-4 transition-all duration-300" href="index.html">Journal</a>
        </nav>
    </footer>

    <script src="db.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            loginError.classList.add('hidden');
            btn.innerText = 'AUTHENTICATING...';
            btn.disabled = true;
            btn.style.opacity = '0.6';
            
            // Simulating a minor delay for "editorial" feel
            setTimeout(() => {
                const success = db.login(email, password);
                if (success) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || 'dashboard.html';
                    window.location.href = redirect;
                } else {
                    loginError.classList.remove('hidden');
                    btn.innerText = originalText;
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }
            }, 1000);
        });

        // Atmospheric parallax on mouse move (very subtle)
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 6;
            const y = (e.clientY / window.innerHeight - 0.5) * 6;
            const container = document.getElementById('parallax-container');
            container.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
