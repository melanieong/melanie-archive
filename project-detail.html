<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MELANIE'S ARCHIVE - Project Details</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Literata:wght@600&family=Karla:wght@400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="style.css" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed-variant": "#314c44",
                      "secondary-fixed-dim": "#7cd9a5",
                      "rewards-slate": "#33433d",
                      "green-light": "#d4e9e2",
                      "on-surface": "#181d1a",
                      "on-secondary-fixed": "#002112",
                      "on-tertiary": "#ffffff",
                      "tertiary-fixed-dim": "#afcdc3",
                      "canvas-warm": "#f2f0eb",
                      "secondary-fixed": "#97f6c0",
                      "primary-container": "#006241",
                      "on-secondary": "#ffffff",
                      "on-primary-fixed": "#002113",
                      "surface-container-lowest": "#ffffff",
                      "outline": "#6f7a72",
                      "surface-container": "#ebefea",
                      "surface-container-highest": "#e0e3de",
                      "gold": "#cba258",
                      "surface-variant": "#e0e3de",
                      "secondary": "#006c44",
                      "tertiary": "#28433c",
                      "on-secondary-fixed-variant": "#005232",
                      "on-secondary-container": "#007349",
                      "surface-bright": "#f7faf5",
                      "background": "#f7faf5",
                      "inverse-primary": "#87d7ad",
                      "tertiary-container": "#405b53",
                      "primary-fixed": "#a2f3c8",
                      "gold-light": "#dfc49d",
                      "neutral-cool": "#f9f9f9",
                      "gold-lightest": "#faf6ee",
                      "primary": "#00482f",
                      "error-container": "#ffdad6",
                      "inverse-surface": "#2d312e",
                      "green-uplift": "#2b5148",
                      "inverse-on-surface": "#eef2ec",
                      "surface-container-high": "#e6e9e4",
                      "surface": "#f7faf5",
                      "on-primary-container": "#8bdbb1",
                      "ceramic": "#edebe9",
                      "on-tertiary-fixed": "#04201a",
                      "on-error": "#ffffff",
                      "surface-dim": "#d7dbd6",
                      "secondary-container": "#97f6c0",
                      "surface-container-low": "#f1f5ef",
                      "on-primary": "#ffffff",
                      "on-tertiary-container": "#b3d1c7",
                      "error": "#ba1a1a",
                      "outline-variant": "#bec9c0",
                      "on-background": "#181d1a",
                      "surface-tint": "#146b4a",
                      "primary-fixed-dim": "#87d7ad",
                      "on-primary-fixed-variant": "#005235",
                      "tertiary-fixed": "#cbe9df",
                      "on-surface-variant": "#3f4943",
                      "on-error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "space-2": "0.8rem",
                      "space-7": "6.4rem",
                      "space-5": "3.2rem",
                      "space-3": "1.6rem",
                      "space-4": "2.4rem",
                      "space-1": "0.4rem",
                      "base": "1.6rem"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-serif": ["Literata"],
                      "script-touch": ["Karla"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.16px", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.16px", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "-0.16px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.16px", "fontWeight": "700"}],
                      "body-lg": ["19px", {"lineHeight": "1.5", "letterSpacing": "-0.16px", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-serif": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "script-touch": ["18px", {"lineHeight": "1.2", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-canvas-warm text-on-surface font-body-md page-fade-in flex flex-col md:flex-row h-screen overflow-hidden selection:bg-green-light">
    <!-- Persistent SideNavBar Shell -->
    <aside class="w-full md:w-64 h-auto md:h-screen bg-canvas-warm border-b md:border-r border-ceramic flex flex-col py-4 px-4 md:py-space-4 md:px-space-2 flex-shrink-0 overflow-y-auto custom-scrollbar z-50">
        <div class="flex md:flex-col justify-between items-center md:items-start mb-0 md:mb-space-6 cursor-pointer w-full" onclick="window.location.href='index.html'">
            <div class="ml-2">
                <h1 class="font-headline-lg text-xl md:text-headline-lg tracking-tighter text-primary leading-tight">MELANIE'S ARCHIVE</h1>
                <p class="font-label-md text-xs md:text-label-md text-on-surface-variant opacity-70">Creative Archive</p>
            </div>
            <!-- Mobile Menu Toggle -->
            <button id="mobile-menu-toggle" onclick="toggleMobileMenu()" class="md:hidden p-2 hover:bg-ceramic rounded-full active-scale flex items-center justify-center">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
        
        <!-- Sidebar Navigation Container -->
        <nav id="sidebar-nav" class="hidden md:flex flex-col md:flex-grow space-y-2 md:space-y-space-1 w-full mt-4 md:mt-0 pb-4 md:pb-0">
            <!-- Loaded dynamically by JS -->
        </nav>
        
        <!-- Bottom Actions & User Profile -->
        <div id="sidebar-bottom-sec" class="hidden md:flex flex-col mt-auto w-full px-2 pt-4 border-t border-ceramic md:border-none">
            <button id="sidebar-new-btn" onclick="handleNewEntry()" class="w-full bg-primary-container text-on-primary py-space-3 rounded-full flex items-center justify-center gap-space-2 active-scale transition-transform hidden">
                <span class="material-symbols-outlined" data-icon="add">add</span>
                <span class="font-label-md text-label-md">New Entry</span>
            </button>
            <div id="user-profile-sec" class="mt-space-4 w-full">
                <!-- Loaded dynamically by JS -->
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-grow h-screen overflow-y-auto custom-scrollbar py-space-2 px-space-6 md:py-space-3 md:px-space-7 max-w-[1600px] flex flex-col">
        <!-- Top Header Navigation (Internal) -->
        <header class="flex justify-between items-center mb-space-3 w-full flex-shrink-0">
            <div>
                <span class="font-script-touch text-script-touch text-secondary italic mb-2 block">Curated Collection</span>
                <h2 class="font-display-lg text-display-lg text-primary-container leading-tight">Learning Journeys &amp; Archives</h2>
            </div>
            <div class="flex items-center gap-space-4">
                <div class="relative hidden lg:block">
                    <input id="header-search" class="bg-ceramic border-none rounded-full py-2 px-space-4 w-64 focus:ring-2 focus:ring-primary-container font-body-md text-on-surface transition-all duration-300" placeholder="Search archive..." type="text"/>
                    <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
                </div>
                <button class="p-2 hover:bg-surface-container rounded-full transition-colors active-scale" onclick="alert('No new notifications.')">
                    <span class="material-symbols-outlined text-primary" data-icon="notifications">notifications</span>
                </button>
                <div id="header-profile-sec" class="flex items-center">
                    <!-- User profile avatar or sign-in loads dynamically -->
                </div>
            </div>
        </header>

        <!-- Inner Content Area -->
        <div class="flex-grow">
            <section class="py-12">
                <div class="max-w-6xl mx-auto">
                    <!-- Breadcrumbs and Header -->
                    <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8">
                        <div>
                            <nav class="flex gap-2 text-label-md text-outline mb-2">
                                <a class="hover:text-primary" href="index.html">Projects</a>
                                <span>/</span>
                                <span id="detail-breadcrumb-title" class="text-secondary-fixed-variant">Project Details</span>
                            </nav>
                            <h2 id="detail-project-title" class="font-headline-lg text-headline-lg text-primary-container mb-4">Project Title</h2>
                            <p id="detail-project-desc" class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl leading-relaxed">
                                Project detailed description.
                            </p>
                        </div>
                        <div class="flex gap-3">
                            <div class="bg-green-light px-4 py-2 rounded-lg flex items-center gap-2 text-primary">
                                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">star</span>
                                <span id="detail-milestones-count" class="font-label-md">0 Milestones</span>
                            </div>
                            <div class="bg-ceramic px-4 py-2 rounded-lg flex items-center gap-2 text-on-surface">
                                <span class="material-symbols-outlined text-[20px]">calendar_today</span>
                                <span id="detail-project-year" class="font-label-md">Date</span>
                            </div>
                        </div>
                    </div>

                    <!-- Hero Project Image Banner -->
                    <div class="w-full h-96 overflow-hidden rounded-xl mb-12 shadow-sm">
                        <img id="detail-project-hero" class="w-full h-full object-cover" src="" alt="Project Hero Image"/>
                    </div>

                    <!-- Filter Timeline Bar -->
                    <div class="bg-surface-container-lowest p-5 rounded-xl border border-outline-variant flex flex-col lg:flex-row lg:items-center justify-between gap-space-4 relative shadow-sm">
                        <!-- Type Chips -->
                        <div id="detail-type-filters-container" class="flex flex-wrap items-center gap-2">
                            <!-- Loaded dynamically via JavaScript -->
                        </div>

                        <!-- Sort & View Controls -->
                        <div class="flex flex-wrap items-center gap-4">
                            <!-- Sort Dropdown -->
                            <div class="flex items-center gap-3">
                                <span class="font-label-md text-outline uppercase tracking-wider text-xs">Sort:</span>
                                <select id="detail-sort-select" onchange="setDetailSort(this.value)" class="bg-ceramic border-none rounded-full py-1.5 px-4 font-label-md text-xs focus:ring-2 focus:ring-primary-container text-on-surface pr-8 focus:outline-none cursor-pointer">
                                    <option value="date-desc">Date (Newest first)</option>
                                    <option value="date-asc">Date (Oldest first)</option>
                                    <option value="title-asc">Title (A-Z)</option>
                                    <option value="title-desc">Title (Z-A)</option>
                                </select>
                            </div>

                            <div class="h-6 w-[1px] bg-ceramic hidden lg:block"></div>

                            <div class="flex items-center gap-3">
                                <span class="font-body-md text-on-surface-variant text-xs font-semibold">View:</span>
                                <button id="view-gallery-btn" onclick="setViewMode('gallery')" class="p-2 text-primary bg-green-light rounded-lg hover:opacity-95 active-scale transition-all" title="Gallery View (Waterfall)">
                                    <span class="material-symbols-outlined text-[20px]">dashboard</span>
                                </button>
                                <button id="view-grid-btn" onclick="setViewMode('grid')" class="p-2 text-outline hover:bg-ceramic hover:text-primary rounded-lg transition-colors active-scale" title="Grid View">
                                    <span class="material-symbols-outlined text-[20px]">grid_view</span>
                                </button>
                                <button id="view-list-btn" onclick="setViewMode('list')" class="p-2 text-outline hover:bg-ceramic hover:text-primary rounded-lg transition-colors active-scale" title="List View">
                                    <span class="material-symbols-outlined text-[20px]">view_list</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Post Archive Grid (Milestones Timeline) -->
                    <div id="milestones-grid" class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6 block mt-16">
                        <!-- Loaded dynamically from database -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Floating Frap CTA (visible for admins only) -->
    <button id="detail-frap-cta" onclick="handleNewEntry()" class="fixed bottom-8 right-8 w-14 h-14 bg-secondary-container text-on-secondary-container hover:bg-green-light rounded-full frap-shadow flex items-center justify-center press-active hover:scale-110 transition-all z-[70] group hidden" title="New Milestone Entry">
        <span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">add</span>
        <span class="absolute right-full mr-4 bg-secondary-container text-on-secondary-container px-4 py-2 rounded-lg font-label-md opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap shadow-md pointer-events-none">New Entry</span>
    </button>

    <!-- Post Detail Overlay Modal -->
    <div id="post-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 transition-opacity duration-300 opacity-0" onclick="closePostModal()">
        <div class="bg-canvas-warm rounded-2xl max-w-2xl w-full shadow-2xl border border-ceramic transform scale-95 transition-transform duration-300 overflow-y-auto max-h-[90vh] custom-scrollbar" onclick="event.stopPropagation()">
            <div class="p-6 md:p-8">
                <div class="flex justify-between items-center mb-6">
                    <span id="modal-post-type" class="bg-primary-container text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Type</span>
                    <button class="p-2 hover:bg-ceramic rounded-full active-scale" onclick="closePostModal()">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                
                <!-- Hero Image Container (For standard blog posts) -->
                <div id="modal-image-container" class="w-full aspect-video overflow-hidden rounded-xl mb-6 hidden shadow-sm">
                    <img id="modal-post-image" class="w-full h-full object-cover" src="" alt="Post image" />
                </div>
                

                
                <span id="modal-post-date" class="font-label-md text-secondary opacity-70 block mb-2">Date</span>
                <h3 id="modal-post-title" class="font-headline-serif text-3xl text-primary font-bold mb-4">Post Title</h3>
                
                <div id="modal-post-desc-container" class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed mb-6 whitespace-pre-wrap">
                    Post full content goes here...
                </div>
                
                <div class="border-t border-ceramic pt-6 flex justify-between items-center">
                    <span id="modal-post-label" class="font-label-md text-gold flex items-center gap-1 text-sm font-semibold">
                        <span class="material-symbols-outlined text-[18px]">star</span>
                        Label
                    </span>
                    <button id="modal-edit-entry-btn" onclick="openEditMilestoneModal()" class="bg-ceramic hover:bg-[#dcdad5] text-primary px-4 py-2 rounded-full font-bold text-xs flex items-center gap-1.5 active-scale transition-colors hidden">
                        <span class="material-symbols-outlined text-[16px]">edit</span>
                        Edit Entry
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Milestone Modal -->
    <div id="edit-milestone-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300" onclick="closeEditMilestoneModal()">
        <div class="bg-canvas-warm p-8 rounded-2xl max-w-md w-full shadow-2xl border border-ceramic transform scale-95 transition-transform duration-300 overflow-y-auto max-h-[90vh] custom-scrollbar" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-headline-serif text-2xl text-primary font-bold">Edit Entry</h3>
                <button type="button" class="p-2 hover:bg-ceramic rounded-full active-scale" onclick="closeEditMilestoneModal()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="editMilestoneForm" onsubmit="saveEditMilestone(event)" class="space-y-4">
                <input type="hidden" id="edit-ms-index" />
                
                <!-- Title -->
                <div class="flex flex-col">
                    <label class="font-label-md text-xs text-on-surface-variant mb-1 uppercase tracking-wider font-semibold" for="edit-ms-title">Entry Title</label>
                    <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant" id="edit-ms-title" placeholder="e.g. Week 01: The Gear Setup" required type="text"/>
                </div>

                <!-- Row for Type & Date -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="font-label-md text-xs text-on-surface-variant mb-1 uppercase tracking-wider font-semibold">Type</label>
                        <div id="edit-ms-type-chips" class="flex flex-wrap gap-1 mb-2"></div>
                        <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant text-[13px] py-1 px-2.5 h-[36px]" id="edit-ms-type" placeholder="Or type custom..." required type="text"/>
                    </div>
                    <div class="flex flex-col justify-end">
                        <label class="font-label-md text-xs text-on-surface-variant mb-1 uppercase tracking-wider font-semibold" for="edit-ms-date">Original Date</label>
                        <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant" id="edit-ms-date" placeholder="e.g. Jan 12, 2024" required type="text"/>
                    </div>
                </div>

                <!-- Row for Badge Label & Icon -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="font-label-md text-xs text-on-surface-variant mb-1 uppercase tracking-wider font-semibold">Badge Label</label>
                        <div id="edit-ms-label-chips" class="flex flex-wrap gap-1 mb-2"></div>
                        <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant text-[13px] py-1 px-2.5 h-[36px]" id="edit-ms-label" placeholder="Or type custom..." required type="text"/>
                    </div>
                    <div class="flex flex-col">
                        <label class="font-label-md text-xs text-on-surface-variant mb-1 uppercase tracking-wider font-semibold">Material Icon</label>
                        <div id="edit-ms-icon-chips" class="flex flex-wrap gap-1 mb-2"></div>
                        <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant text-[13px] py-1 px-2.5 h-[36px]" id="edit-ms-icon" placeholder="Or type custom..." required type="text"/>
                    </div>
                </div>

                <!-- Typewriter Note Toggle -->
                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="edit-ms-isnote" onchange="toggleEditMilestoneNoteField()" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4" />
                    <label class="font-label-md text-xs text-on-surface-variant uppercase tracking-wider font-semibold" for="edit-ms-isnote">Typewriter Note (Text Notepad Layout)</label>
                </div>

                <!-- Save as Draft Toggle -->
                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="edit-ms-isdraft" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4" />
                    <label class="font-label-md text-xs text-on-surface-variant uppercase tracking-wider font-semibold cursor-pointer select-none" for="edit-ms-isdraft">Save as Draft</label>
                </div>

                <!-- Image URL -->
                <div class="flex flex-col" id="edit-ms-image-group">
                    <label class="font-label-md text-xs text-on-surface-variant mb-1 uppercase tracking-wider font-semibold" for="edit-ms-image">Image URL</label>
                    <input class="signature-input font-body-md text-body-md text-primary placeholder-outline-variant" id="edit-ms-image" placeholder="https://images.unsplash.com/photo-..." type="url"/>
                </div>

                <!-- Description -->
                <div class="flex flex-col">
                    <label class="font-label-md text-xs text-on-surface-variant mb-2 uppercase tracking-wider font-semibold" for="edit-ms-desc">Description / Content</label>
                    <div class="flex items-center gap-2 bg-surface-container-low px-3 py-1.5 rounded-t-lg border-t border-r border-l border-outline-variant select-none text-[11px] font-semibold text-on-surface-variant">
                        <button type="button" onclick="insertFormatting('edit-ms-desc', '**', '**')" class="px-2 py-0.5 hover:bg-ceramic rounded font-bold" title="Bold">B</button>
                        <button type="button" onclick="insertFormatting('edit-ms-desc', '*', '*')" class="px-2 py-0.5 hover:bg-ceramic rounded italic" title="Italic">I</button>
                        <button type="button" onclick="insertFormatting('edit-ms-desc', '~~', '~~')" class="px-2 py-0.5 hover:bg-ceramic rounded line-through" title="Strikethrough">S</button>
                        <button type="button" onclick="insertFormatting('edit-ms-desc', '__', '__')" class="px-2 py-0.5 hover:bg-ceramic rounded underline" title="Underline">U</button>
                        <button type="button" onclick="insertFormatting('edit-ms-desc', '# ', '')" class="px-2 py-0.5 hover:bg-ceramic rounded font-bold" title="Heading">H</button>
                        <button type="button" onclick="insertFormatting('edit-ms-desc', '> ', '')" class="px-2 py-0.5 hover:bg-ceramic rounded font-bold" title="Pull Quote">Quote</button>
                    </div>
                    <textarea id="edit-ms-desc" rows="4" class="bg-surface-container-lowest border-outline-variant rounded-b-lg border-t-0 p-3 font-body-md text-on-surface focus:ring-primary focus:border-primary" placeholder="Provide milestone story, notes, or reflection text..." required></textarea>
                </div>

                <div class="flex items-center gap-4 pt-4 border-t border-ceramic">
                    <button type="submit" class="flex-grow bg-primary hover:bg-[#005e3a] text-white py-3 rounded-full font-bold active-scale transition-transform shadow-md uppercase tracking-widest text-xs">Save Changes</button>
                    <button type="button" onclick="closeEditMilestoneModal()" class="flex-grow bg-ceramic hover:bg-[#dcdad5] text-on-surface py-3 rounded-full font-bold active-scale transition-transform uppercase tracking-widest text-xs">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProjectDetails();
            renderTypeFilters();
            updateProfileSection();
            setupSearch();

            // Intercept URL parameters for auto editing
            const urlParams = new URLSearchParams(window.location.search);
            const openEditParam = urlParams.get('openEdit');
            if (openEditParam !== null && db.isAuthenticated()) {
                activeMilestoneIndex = parseInt(openEditParam);
                setTimeout(() => {
                    openEditMilestoneModal();
                }, 100);
            }
        });

        function updateProfileSection() {
            const profileSec = document.getElementById('user-profile-sec');
            const nav = document.getElementById('sidebar-nav');
            const newBtn = document.getElementById('sidebar-new-btn');
            const frapBtn = document.getElementById('detail-frap-cta');
            const headerProfileSec = document.getElementById('header-profile-sec');

            if (db.isAuthenticated()) {
                const user = db.getCurrentUser();
                if (newBtn) newBtn.classList.remove('hidden');
                if (frapBtn) frapBtn.classList.remove('hidden');
                
                if (nav) {
                    nav.innerHTML = `
                        <a class="flex items-center gap-space-3 py-space-2 rounded-lg text-on-surface-variant pl-4 hover:bg-ceramic transition-colors active-scale" href="index.html">
                            <span class="material-symbols-outlined">dashboard</span>
                            <span class="font-label-md text-label-md">Overview</span>
                        </a>

        function parseEntryDate(dateStr) {
            const parsed = Date.parse(dateStr);
            return isNaN(parsed) ? 0 : parsed;
        }

        function parseMarkdown(text) {
            if (!text) return '';
            let html = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            html = html.replace(/^(?:#|###)\s*(.*?)$/gm, '<h3 class="text-base md:text-lg font-bold text-primary mt-4 mb-2">$1</h3>');
            html = html.replace(/^&gt;\s*(.*?)$/gm, '<blockquote class="border-l-4 border-gold pl-3 py-1 my-3 italic text-on-surface-variant bg-gold-lightest/50 rounded-r">$1</blockquote>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');
            html = html.replace(/__(.*?)__/g, '<u>$1</u>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function distributeWaterfall(items, gridContainer) {
            gridContainer.innerHTML = '';
            
            // Determine column count based on viewport width (responsive)
            let numCols = 1;
            if (window.innerWidth >= 1024) {
                numCols = 3;
            } else if (window.innerWidth >= 768) {
                numCols = 2;
            }
            
            // Reconfigure grid class to display columns side-by-side using Tailwind grid structure
            gridContainer.className = `grid grid-cols-1 md:grid-cols-${Math.min(2, numCols)} lg:grid-cols-${numCols} gap-6 items-start w-full mt-16`;
            
            const colDivs = [];
            for (let i = 0; i < numCols; i++) {
                const col = document.createElement('div');
                col.className = 'flex flex-col gap-6 w-full';
                gridContainer.appendChild(col);
                colDivs.push(col);
            }
            
            const colHeights = new Array(numCols).fill(0);
            
            items.forEach(card => {
                // Estimate height to keep columns beautifully balanced
                let estHeight = 250;
                const img = card.querySelector('img');
                const p = card.querySelector('p');
                const descLen = p ? (p.textContent || '').length : 0;
                
                if (img) estHeight += 200;
                if (card.dataset.isNote === 'true') estHeight += 80;
                estHeight += Math.min(180, descLen * 0.4);
                
                // Find column with minimum height
                let minIndex = 0;
                let minHeight = colHeights[0];
                for (let i = 1; i < numCols; i++) {
                    if (colHeights[i] < minHeight) {
                        minHeight = colHeights[i];
                        minIndex = i;
                    }
                }
                
                colDivs[minIndex].appendChild(card);
                colHeights[minIndex] += estHeight;
            });
        }

        function renderMilestones() {
            if (!currentProject) return;

            const grid = document.getElementById('milestones-grid');
            if (!grid) return;

            grid.innerHTML = '';
            let milestones = [...(currentProject.milestones || [])].filter(m => !m.isDraft);

            // Update milestones count (only count entries labeled a milestone)
            const milestoneCount = milestones.filter(m => m.label && m.label.toLowerCase().includes('milestone')).length;
            const countEl = document.getElementById('detail-milestones-count');
            if (countEl) {
                countEl.innerText = `${milestoneCount} Milestone${milestoneCount !== 1 ? 's' : ''}`;
            }

            // 1. Filter by search query
            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase();
                milestones = milestones.filter(m => 
                    (m.title || '').toLowerCase().includes(q) ||
                    (m.description || '').toLowerCase().includes(q) ||
                    (m.type && m.type.toLowerCase().includes(q)) ||
                    (m.label && m.label.toLowerCase().includes(q))

            // 2. Filter by type
            if (activeTypeFilter !== 'All') {
                milestones = milestones.filter(m => m.type && m.type.toLowerCase() === activeTypeFilter.toLowerCase());
            }

            // 3. Sort entries
            milestones.sort((a, b) => {
                if (currentSort === 'date-desc') {
                    return parseEntryDate(b.date) - parseEntryDate(a.date);
                } else if (currentSort === 'date-asc') {
                    return parseEntryDate(a.date) - parseEntryDate(b.date);
                } else if (currentSort === 'title-asc') {
                    return a.title.localeCompare(b.title);

            // Cache the active milestone index
            if (project && project.milestones) {
                activeMilestoneIndex = project.milestones.indexOf(post);
            } else {
                activeMilestoneIndex = null;
            }
            
            document.getElementById('modal-post-type').innerText = post.type;
            
            // Format original date and edit date if it exists
            const displayDate = post.editedDate ? `${post.date} (Edited: ${post.editedDate})` : post.date;
            document.getElementById('modal-post-date').innerText = displayDate;
            
            document.getElementById('modal-post-title').innerText = post.title;
            document.getElementById('modal-post-desc-container').innerHTML = parseMarkdown(post.description);
            
            const labelSpan = document.getElementById('modal-post-label');
            labelSpan.innerHTML = `
                <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">${post.icon || 'star'}</span>
                ${post.label}
            `;

            const imgContainer = document.getElementById('modal-image-container');

            if (post.isNote) {
                imgContainer.classList.add('hidden');
            } else {
                imgContainer.classList.remove('hidden');
                
                // Set high quality image
                const fallbackImg = "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=800&q=80";
                const postImg = post.imageUrl || fallbackImg;
                document.getElementById('modal-post-image').src = postImg;
                document.getElementById('modal-post-image').alt = post.title;
            }

            // Dynamic toggle for admin edit entry button
            const editBtn = document.getElementById('modal-edit-entry-btn');
            if (editBtn) {
                if (db.isAuthenticated()) {
                    editBtn.classList.remove('hidden');
                } else {
                    editBtn.classList.add('hidden');
                }
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                child.classList.remove('scale-95');
            }, 10);
        }

        function closePostModal() {
            const modal = document.getElementById('post-modal');
            const child = modal.firstElementChild;
            
            modal.classList.add('opacity-0');
            child.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function handleNewEntry() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id') || "";
            if (db.isAuthenticated()) {
                window.location.href = `manage-projects.html?action=new-entry&projectId=${projectId}`;
            } else {
                window.location.href = `login.html?redirect=manage-projects.html?action=new-entry&projectId=${projectId}`;
            }
        }

        // Option Chips for Edit Modal
        const CHIP_OPTIONS = {
            type: db.getCategories(),
            label: ['Written Log', 'Launch', 'Milestone', 'Foundation', 'Capture', 'Completed'],
            icon: ['history_edu', 'flag', 'star', 'grid_view', 'photo_camera', 'check_circle']
        };

        const SMART_PRESETS = {
            'Note': { label: 'Written Log', icon: 'history_edu', isNote: true }
        };

        function initEditChipsToggles() {
            CHIP_OPTIONS.type = db.getCategories();
            setupChips('edit-ms-type-chips', 'edit-ms-type', CHIP_OPTIONS.type, false, (val) => {
                applyEditSmartPreset(val);
            });
            setupChips('edit-ms-label-chips', 'edit-ms-label', CHIP_OPTIONS.label, false);
            setupChips('edit-ms-icon-chips', 'edit-ms-icon', CHIP_OPTIONS.icon, true);
        }

        function applyEditSmartPreset(typeVal) {
            const preset = SMART_PRESETS[typeVal];
            if (preset) {
                const labelInput = document.getElementById('edit-ms-label');
                const iconInput = document.getElementById('edit-ms-icon');
                const checkbox = document.getElementById('edit-ms-isnote');
                
                if (labelInput) {
                    labelInput.value = preset.label;
                    labelInput.dispatchEvent(new Event('input'));
                }
                if (iconInput) {
                    iconInput.value = preset.icon;
                    iconInput.dispatchEvent(new Event('input'));
                }
                if (checkbox) {
                    checkbox.checked = preset.isNote;
                    toggleEditMilestoneNoteField();
                }
            }
        }

        function setupChips(containerId, inputId, options, isIconField = false, onSelectCallback = null) {
            const container = document.getElementById(containerId);
            const input = document.getElementById(inputId);
            if (!container || !input) return;

            container.innerHTML = '';
            
            const isTypeChips = containerId.toLowerCase().includes('type');

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'chip-btn px-2.5 py-1 text-[11px] rounded-full border transition-all duration-200 active-scale flex items-center gap-1';
                
                if (isIconField) {
                    btn.innerHTML = `<span class="material-symbols-outlined text-[13px]">${opt}</span><span class="text-[9px] font-semibold">${opt}</span>`;
                } else {
                    btn.innerText = opt;
                    
                    if (isTypeChips && opt !== 'Note') {
                        const delSpan = document.createElement('span');
                        delSpan.className = 'ml-1.5 hover:text-red-600 font-bold px-1 rounded-full hover:bg-black/10 transition-colors text-[10px] flex items-center justify-center h-3 w-3';
                        delSpan.innerText = '×';
                        delSpan.title = `Delete Category "${opt}"`;
                        delSpan.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (confirm(`Are you sure you want to delete category "${opt}"?`)) {
                                db.deleteCategory(opt);
                                CHIP_OPTIONS.type = db.getCategories();
                                setupChips(containerId, inputId, CHIP_OPTIONS.type, isIconField, onSelectCallback);
                                if (input.value === opt) {
                                    input.value = 'Note';
                                    input.dispatchEvent(new Event('input'));
                                }
                                // Re-render the filters in the main layout if on category deletion
                                if (typeof renderTypeFilters === 'function') renderTypeFilters();
                            }
                        });
                        btn.appendChild(delSpan);
                    }
                }

                btn.addEventListener('click', () => {
                    input.value = opt;
                    updateChipsHighlight(container, opt);
                    input.dispatchEvent(new Event('input'));
                    if (onSelectCallback) {
                        onSelectCallback(opt);
                    }
                });
                container.appendChild(btn);
            });

            if (isTypeChips) {
                const addBtn = document.createElement('button');
                addBtn.type = 'button';
                addBtn.className = 'px-2.5 py-1 text-[11px] rounded-full border border-dashed border-primary text-primary bg-transparent hover:bg-green-light transition-all duration-200 flex items-center gap-1 active-scale font-semibold';
                addBtn.innerHTML = '<span class="material-symbols-outlined text-[12px] font-bold">add</span>Add Custom';
                addBtn.addEventListener('click', () => {
                    const newCat = prompt("Enter new category / entry type name:");
                    if (newCat && newCat.trim()) {
                        const clean = newCat.trim();
                        const added = db.addCategory(clean);
                        if (added) {
                            CHIP_OPTIONS.type = db.getCategories();
                            setupChips(containerId, inputId, CHIP_OPTIONS.type, isIconField, onSelectCallback);
                            input.value = clean;
                            input.dispatchEvent(new Event('input'));
                            if (onSelectCallback) {
                                onSelectCallback(clean);
                            }
                            // Re-render the filters in the main layout
                            if (typeof renderTypeFilters === 'function') renderTypeFilters();
                        } else {
                            alert("Category already exists or is invalid.");
                        }
                    }
                });
                container.appendChild(addBtn);
            }

            input.addEventListener('input', () => {
                updateChipsHighlight(container, input.value);
            });

            updateChipsHighlight(container, input.value);
        }

        function updateChipsHighlight(container, value) {
            const buttons = container.querySelectorAll('.chip-btn');
            buttons.forEach(btn => {
                let btnVal = '';
                if (btn.querySelector('.material-symbols-outlined')) {
                    const textSpan = btn.querySelector('span:not(.material-symbols-outlined)');
                    btnVal = textSpan ? textSpan.textContent.trim() : (btn.lastElementChild ? btn.lastElementChild.textContent.trim() : '');
                } else {
                    btnVal = btn.textContent.replace('×', '').trim();
                }
                
                if (btnVal.toLowerCase() === (value || '').trim().toLowerCase()) {
                    btn.className = 'chip-btn px-2.5 py-1 text-[11px] rounded-full border transition-all duration-200 active-scale flex items-center gap-1 bg-[#006c47] text-white border-[#006c47] shadow-sm font-semibold';
                } else {
                    btn.className = 'chip-btn px-2.5 py-1 text-[11px] rounded-full border transition-all duration-200 active-scale flex items-center gap-1 bg-[#faf6ee] text-primary border-[#dcdad5] hover:bg-[#eae6de] font-normal';
                }
            });
        }

        function openEditMilestoneModal() {
            if (activeMilestoneIndex === null || !currentProject || !currentProject.milestones || !currentProject.milestones[activeMilestoneIndex]) return;

            const modal = document.getElementById('edit-milestone-modal');
            const form = document.getElementById('editMilestoneForm');
            form.reset();

            const m = currentProject.milestones[activeMilestoneIndex];
            
            document.getElementById('edit-ms-index').value = activeMilestoneIndex;
            document.getElementById('edit-ms-title').value = m.title || '';
            document.getElementById('edit-ms-type').value = m.type || '';
            document.getElementById('edit-ms-date').value = m.date || '';
            document.getElementById('edit-ms-label').value = m.label || '';
            document.getElementById('edit-ms-icon').value = m.icon || '';
            document.getElementById('edit-ms-isnote').checked = m.isNote || false;
            document.getElementById('edit-ms-isdraft').checked = m.isDraft || false;
            document.getElementById('edit-ms-image').value = m.imageUrl || '';
            document.getElementById('edit-ms-desc').value = m.description || '';

            // Initialize chips
            initEditChipsToggles();

            // Trigger input events to update chips highlight
            document.getElementById('edit-ms-type').dispatchEvent(new Event('input'));
            document.getElementById('edit-ms-label').dispatchEvent(new Event('input'));
            document.getElementById('edit-ms-icon').dispatchEvent(new Event('input'));

            toggleEditMilestoneNoteField();

            // Hide detail modal nicely
            closePostModal();

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95');
            }, 10);
        }

        function closeEditMilestoneModal() {
            const modal = document.getElementById('edit-milestone-modal');
            const child = modal.firstElementChild;

            modal.classList.add('opacity-0');
            child.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function toggleEditMilestoneNoteField() {
            const isNote = document.getElementById('edit-ms-isnote').checked;
            const imageGroup = document.getElementById('edit-ms-image-group');
            if (isNote) {
                imageGroup.classList.add('hidden');
            } else {
                imageGroup.classList.remove('hidden');
            }
        }

        async function saveEditMilestone(event) {
            event.preventDefault();
            if (activeMilestoneIndex === null || !currentProject) return;

            const saveBtn = event.target.querySelector('button[type="submit"]');
            const originalText = saveBtn.innerText;
            saveBtn.disabled = true;
            saveBtn.innerHTML = `
                <span class="inline-flex items-center gap-2">
                    <span class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                    Syncing...
                </span>
            `;

            const isNote = document.getElementById('edit-ms-isnote').checked;
            const originalDateVal = document.getElementById('edit-ms-date').value;

            // Stamp current date as editedDate
            const todayStr = new Date().toLocaleDateString('en-US', {month: 'short', day: '2-digit', year: 'numeric'});

            const milestone = {
                title: document.getElementById('edit-ms-title').value,
                type: document.getElementById('edit-ms-type').value,
                date: originalDateVal,
                label: document.getElementById('edit-ms-label').value,
                icon: document.getElementById('edit-ms-icon').value,
                isNote: isNote,
                isDraft: document.getElementById('edit-ms-isdraft').checked,
                description: document.getElementById('edit-ms-desc').value,
                editedDate: todayStr
            };

            if (!isNote) {
                milestone.imageUrl = document.getElementById('edit-ms-image').value || "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=600&q=80";
            }

            currentProject.milestones[activeMilestoneIndex] = milestone;

            // Update database
            await db.updateProject(currentProject.id, { milestones: currentProject.milestones });

            saveBtn.disabled = false;
            saveBtn.innerText = originalText;

            closeEditMilestoneModal();
            renderMilestones();
        }

        // Window resize debouncer for responsive columns
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                renderMilestones();
            }, 100);
        });

        function insertFormatting(textareaId, prefix, suffix) {
            const textarea = document.getElementById(textareaId);
            if (!textarea) return;
            
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selectedText = text.substring(start, end);
            
            const replacement = prefix + selectedText + suffix;
            textarea.value = text.substring(0, start) + replacement + text.substring(end);
            
            textarea.focus();
            textarea.setSelectionRange(start + prefix.length, start + prefix.length + selectedText.length);
            textarea.dispatchEvent(new Event('input'));
        }

        function toggleMobileMenu() {
            const nav = document.getElementById('sidebar-nav');
            const bottomSec = document.getElementById('sidebar-bottom-sec');
            const toggleIcon = document.querySelector('#mobile-menu-toggle span');
            
            if (nav.classList.contains('hidden')) {
                nav.classList.remove('hidden');
                nav.classList.add('flex');
                if (bottomSec) {
                    bottomSec.classList.remove('hidden');
                    bottomSec.classList.add('flex');
                }
                if (toggleIcon) toggleIcon.innerText = 'close';
            } else {
                nav.classList.add('hidden');
                nav.classList.remove('flex');
                if (bottomSec) {
                    bottomSec.classList.add('hidden');
                    bottomSec.classList.remove('flex');
                }
                if (toggleIcon) toggleIcon.innerText = 'menu';
            }
        }
    </script>
</body>
</html>
